name: Health Check

on:
  push:
    branches: [main, staging]
    paths:
      - "*.Dockerfile"
      - ".dockerignore"
      - "apps/api/**"
      - "apps/basket/**"
      - "packages/**"
      - "bun.lock"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/health-check.yml"
  pull_request:
    branches: [main, staging]
    paths:
      - "*.Dockerfile"
      - ".dockerignore"
      - "apps/api/**"
      - "apps/basket/**"
      - "packages/**"
      - "bun.lock"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/health-check.yml"

permissions:
  contents: read

concurrency:
  group: health-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-health-check:
    name: API Health Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: databuddy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d databuddy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:25.5.1-alpine
        env:
          CLICKHOUSE_DB: databuddy_test
          CLICKHOUSE_USER: default
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Mount Docker build cache
        uses: useblacksmith/stickydisk@41873b1513bb679f9c115504cbd13d3660432504 # v1
        with:
          key: ${{ github.repository }}-docker-build-cache
          path: /tmp/docker-build-cache

      - name: Set up Docker Builder
        uses: useblacksmith/setup-docker-builder@ac083cc84672d01c60d5e8561d0a939b697de542 # v1

      - name: Build API Docker image
        uses: useblacksmith/build-push-action@cbd1f60d194a98cb3be5523b15134501eaf0fbf3 # v2
        with:
          context: .
          file: ./api.Dockerfile
          push: false
          load: true
          tags: api:test

      - name: Run API health check
        run: |
          set -euo pipefail
          trap 'docker rm -f api-health-check >/dev/null 2>&1 || true' EXIT

          docker run -d \
            --name api-health-check \
            --network host \
            -e NODE_ENV=test \
            -e PORT=3001 \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/databuddy_test \
            -e REDIS_URL=redis://localhost:6379 \
            -e BULLMQ_REDIS_URL=redis://localhost:6379/2 \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            -e CLICKHOUSE_URL=http://localhost:8123 \
            -e CLICKHOUSE_HOST=localhost \
            -e CLICKHOUSE_PORT=8123 \
            -e CLICKHOUSE_DATABASE=databuddy_test \
            -e BETTER_AUTH_SECRET=test-auth-secret-for-ci \
            -e BETTER_AUTH_URL=http://localhost:3000 \
            -e GITHUB_CLIENT_ID=test-github-client-id \
            -e GITHUB_CLIENT_SECRET=test-github-client-secret \
            -e GOOGLE_CLIENT_ID=test-google-client-id \
            -e GOOGLE_CLIENT_SECRET=test-google-client-secret \
            -e RESEND_API_KEY=test-resend-api-key \
            -e AUTUMN_SECRET_KEY=test-autumn-secret-key \
            -e EMAIL_API_KEY=test-email-api-key \
            -e IP_HASH_SALT=test-ip-hash-salt \
            api:test

          echo "Waiting for API to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API is responding!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "API failed to start within 30 seconds"
              docker logs api-health-check
              exit 1
            fi
            sleep 1
          done

          STATUS_BODY=$(curl -sS http://localhost:3001/health/status)
          echo "API /health/status: $STATUS_BODY"
          if echo "$STATUS_BODY" | grep -q '"status":"ok"'; then
            echo "API dependency health is valid"
          else
            echo "API dependency health is not ok"
            docker logs api-health-check
            exit 1
          fi

          RESPONSE=$(curl -sf http://localhost:3001/health || echo '{}')
          echo "API /health: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"status"'; then
            echo "API health endpoint structure is valid"
          else
            echo "API health endpoint response missing expected fields"
            docker logs api-health-check
            exit 1
          fi

          echo "API health check passed!"

  basket-health-check:
    name: Basket Health Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:25.5.1-alpine
        env:
          CLICKHOUSE_DB: databuddy_test
          CLICKHOUSE_USER: default
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Mount Docker build cache
        uses: useblacksmith/stickydisk@41873b1513bb679f9c115504cbd13d3660432504 # v1
        with:
          key: ${{ github.repository }}-docker-build-cache
          path: /tmp/docker-build-cache

      - name: Set up Docker Builder
        uses: useblacksmith/setup-docker-builder@ac083cc84672d01c60d5e8561d0a939b697de542 # v1

      - name: Build Basket Docker image
        uses: useblacksmith/build-push-action@cbd1f60d194a98cb3be5523b15134501eaf0fbf3 # v2
        with:
          context: .
          file: ./basket.Dockerfile
          push: false
          load: true
          tags: basket:test

      - name: Run Basket health check
        run: |
          set -euo pipefail
          trap 'docker rm -f basket-health-check basket-redpanda >/dev/null 2>&1 || true' EXIT

          docker run -d \
            --name basket-redpanda \
            --network host \
            redpandadata/redpanda:v25.2.9 \
            redpanda start \
            --mode dev-container \
            --smp 1 \
            --default-log-level=warn \
            --kafka-addr 0.0.0.0:9092 \
            --advertise-kafka-addr localhost:9092

          echo "Waiting for Redpanda to start..."
          for i in {1..30}; do
            if docker exec basket-redpanda rpk cluster health > /dev/null 2>&1; then
              echo "Redpanda is healthy!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Redpanda failed to start within 30 seconds"
              docker logs basket-redpanda
              exit 1
            fi
            sleep 1
          done

          docker run -d \
            --name basket-health-check \
            --network host \
            -e NODE_ENV=test \
            -e PORT=4000 \
            -e REDIS_URL=redis://localhost:6379 \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/databuddy_test \
            -e CLICKHOUSE_URL=http://localhost:8123 \
            -e CLICKHOUSE_HOST=localhost \
            -e CLICKHOUSE_PORT=8123 \
            -e REDPANDA_BROKER=localhost:9092 \
            -e IP_HASH_SALT=test-ip-hash-salt \
            -e KAFKA_ENABLED=false \
            basket:test

          echo "Waiting for Basket to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "Basket is responding!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Basket failed to start within 30 seconds"
              docker logs basket-health-check
              exit 1
            fi
            sleep 1
          done

          STATUS_BODY=$(curl -sS http://localhost:4000/health/status)
          echo "Basket /health/status: $STATUS_BODY"
          if echo "$STATUS_BODY" | grep -q '"status":"ok"'; then
            echo "Basket dependency health is valid"
          else
            echo "Basket dependency health is not ok"
            docker logs basket-health-check
            exit 1
          fi

          RESPONSE=$(curl -sf http://localhost:4000/health || echo '{}')
          echo "Basket /health: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"status"'; then
            echo "Basket health endpoint structure is valid"
          else
            echo "Basket health endpoint response missing expected fields"
            docker logs basket-health-check
            exit 1
          fi

          echo "Basket health check passed!"
